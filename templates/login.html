<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Security Toolkit - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>

<div class="background-animation"></div>

<div class="login-container">
    <div class="login-card">
        <div class="login-logo">
            <i class="fa-solid fa-shield-halved"></i>
        </div>
        <h1>Cyber Security Toolkit</h1>
        <p>Secure Login Portal</p>
        <br>
        
        <form method="POST">
            <div class="input-box">
                <i class="fa fa-user"></i>
                <input type="text" name="username" placeholder="Username" required>
            </div>
            
            <div class="input-box">
                <i class="fa fa-lock"></i>
                <input type="password" id="password" name="password" placeholder="Password" required>
                <span class="toggle-password" onclick="togglePassword()">
                    <i id="eye" class="fa fa-eye"></i>
                </span>
            </div>
            
            <button type="submit" style="width: 100%;">Login</button>
        </form>

        {% if message %}
        <div class="error">{{ message }}</div>
        {% endif %}
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for msg in messages %}
              <div class="error" style="color: #ff4444; border-left: 3px solid #ff4444; background: rgba(255,68,68,0.1); padding: 10px; border-radius: 5px; margin-top: 15px;">{{ msg }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <br>
        <p style="text-align:center; color:white;">
            Don't have an account? 
            <a href="/register" style="color:#00ffff; font-weight:bold; text-decoration:none;">Register Here</a>
        </p>
        
        <div class="footer">Cyber Security Toolkit © 2026</div>
    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
<script src="{{ url_for('static', filename='matrix.js') }}"></script>
</body>
</html>
